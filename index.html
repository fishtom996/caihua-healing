<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鶯鶯姊的心靈熱線</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255, 119, 198, 0.3) 0%, transparent 50%);
        }
        .container { max-width: 800px; width: 100%; text-align: center; }
        h1 {
            font-family: 'ZCOOL KuaiLe', cursive;
            font-size: 3rem;
            color: #ff6b9d;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 107, 157, 0.5);
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .subtitle { font-size: 1.2rem; color: #a0a0a0; margin-bottom: 30px; }
        .chat-box {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: 0 auto 20px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(102, 126, 234, 0.5);
        }
        .avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .problem-select {
            width: 100%;
            padding: 15px;
            font-size: 1rem;
            border-radius: 10px;
            border: 2px solid rgba(147, 51, 234, 0.5);
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            margin-bottom: 15px;
            cursor: pointer;
        }
        .custom-input {
            width: 100%;
            padding: 15px;
            font-size: 1rem;
            border-radius: 10px;
            border: 2px solid rgba(147, 51, 234, 0.5);
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            margin-bottom: 15px;
            display: none;
        }
        .btn {
            padding: 15px 40px;
            font-size: 1.1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Noto Sans TC', sans-serif;
            font-weight: 700;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        .response-area {
            margin-top: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            border-left: 4px solid #ff6b9d;
            text-align: left;
            display: none;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .voice-controls {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            align-items: center;
        }
        .voice-controls label { display: flex; align-items: center; gap: 5px; font-size: 0.9rem; color: #a0a0a0; }
        .voice-btn {
            padding: 8px 20px;
            background: rgba(147, 51, 234, 0.3);
            border: 1px solid rgba(147, 51, 234, 0.5);
            color: #fff;
            border-radius: 20px;
            cursor: pointer;
        }
        .voice-select {
            background: rgba(0,0,0,0.3);
            color: #fff;
            border: 1px solid rgba(147,51,234,0.4);
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 0.85rem;
            min-width: 220px;
        }
        .tts-status {
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: 8px;
            display: inline-block;
        }
        .tts-status.edge { background: rgba(34,197,94,0.2); color: #86efac; border: 1px solid rgba(34,197,94,0.3); }
        .tts-status.local { background: rgba(251,191,36,0.2); color: #fde047; border: 1px solid rgba(251,191,36,0.3); }
        .footer { margin-top: 40px; color: #666; font-size: 0.9rem; }
        .speaking { animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
<base target="_blank">
</head>
<body>
    <div class="container">
        <h1>鶯鶯姊的心靈熱線</h1>
        <p class="subtitle">有什麼煩惱，說出來就舒服多了！</p>

        <div class="chat-box">
            <div class="avatar">
                <img src="yingying.jpg" alt="鶯鶯姊">
            </div>

            <select class="problem-select" id="problemSelect" onchange="selectResponse()">
                <option value="">請選擇您的煩惱類型...</option>
                <option value="work">工作不順心</option>
                <option value="love">感情問題</option>
                <option value="money">金錢煩惱</option>
                <option value="family">家庭關係</option>
                <option value="health">健康問題</option>
                <option value="friend">人際關係</option>
                <option value="custom">其他煩惱（自訂）</option>
            </select>

            <input type="text" class="custom-input" id="customProblem" placeholder="請輸入您的煩惱內容...">

            <button class="btn btn-primary" onclick="generateResponse()">鶯鶯姊開示</button>

            <div class="voice-controls">
                <label>語音角色：
                    <select id="voiceSelect" class="voice-select">
                        <optgroup label="神經網路語音（推薦）">
                            <option value="zh-TW-HsiaoChenNeural" selected>鶯鶯姊（曉臻 - 台灣女声）</option>
                            <option value="zh-TW-HsiaoYuNeural">溫柔姊（曉雨 - 台灣女声）</option>
                            <option value="zh-TW-YunJheNeural">暖心哥（雲哲 - 台灣男声）</option>
                            <option value="zh-CN-XiaoxiaoNeural">曉曉（中國女声）</option>
                            <option value="zh-CN-YunxiNeural">雲希（中國男声）</option>
                        </optgroup>
                        <optgroup label="系統語音（離線）">
                            <option value="web-speech">瀏覽器預設語音</option>
                        </optgroup>
                    </select>
                    <span id="ttsStatus" class="tts-status edge">Edge TTS</span>
                </label>
               <button class="voice-btn" onclick="testVoice()">Test</button>
            </div>
        </div>

        <div class="response-area" id="responseArea">
            <div id="responseText"></div>
            <button class="btn voice-btn" id="speakBtn" onclick="toggleSpeak()" style="display:none; margin-top:15px;">朗讀</button>
        </div>

        <div class="footer">
            <p>隱私保護：語音合成由外部服務提供，對話內容不會被儲存</p>
            <p>已經有 <span id="visitorCount">0</span> 位朋友來找鶯鶯姊聊天了</p>
        </div>
    </div>

    <script>
        var TTS_API_URL = 'https://caihua-tts-proxy.fishtom996.workers.dev';
        var currentAudio = null;
        var isSpeaking = false;
        var synth = window.speechSynthesis || null;
        var taiwanVoice = null;
        var voiceReady = false;
        var useEdgeTTS = true;
        var fullResponseText = '';

        var VOICE_MAP = {
            'zh-TW-HsiaoChenNeural': { name: '鶯鶯姊（曉臻）' },
            'zh-TW-HsiaoYuNeural': { name: '溫柔姊（曉雨）' },
            'zh-TW-YunJheNeural': { name: '暖心哥（雲哲）' },
            'zh-CN-XiaoxiaoNeural': { name: '曉曉' },
            'zh-CN-YunxiNeural': { name: '雲希' },
            'web-speech': { name: '系統預設' }
        };

        document.addEventListener('DOMContentLoaded', function() {
            initVoice();
            setupVoiceSelect();
            updateVisitorCount();

            var voiceSelect = document.getElementById('voiceSelect');
            if (voiceSelect) {
                voiceSelect.addEventListener('change', function(e) {
                    var voiceId = e.target.value;
                    var statusEl = document.getElementById('ttsStatus');
                    if (voiceId === 'web-speech') {
                        useEdgeTTS = false;
                        statusEl.textContent = '系統語音';
                        statusEl.className = 'tts-status local';
                    } else {
                        useEdgeTTS = true;
                        statusEl.textContent = 'Edge TTS';
                        statusEl.className = 'tts-status edge';
                    }
                });
            }
        });

        function setupVoiceSelect() {
            var select = document.getElementById('voiceSelect');
            if (!select) return;
            if (!navigator.onLine) {
                select.value = 'web-speech';
                useEdgeTTS = false;
                var statusEl = document.getElementById('ttsStatus');
                if (statusEl) {
                    statusEl.textContent = '離線模式';
                    statusEl.className = 'tts-status local';
                }
            }
        }

        function initVoice() {
            if (!synth) return;
            var voices = synth.getVoices();
            var voicePriority = [
                function(v) { return v.name.indexOf('HsiaoChen') !== -1 && v.name.indexOf('Natural') !== -1; },
                function(v) { return v.name.indexOf('Google') !== -1 && v.lang.indexOf('zh') !== -1; },
                function(v) { return v.lang.indexOf('zh') !== -1; },
                function(v) { return true; }
            ];
            for (var i = 0; i < voicePriority.length; i++) {
                for (var j = 0; j < voices.length; j++) {
                    if (voicePriority[i](voices[j])) {
                        taiwanVoice = voices[j];
                        break;
                    }
                }
                if (taiwanVoice) break;
            }
            if (taiwanVoice) voiceReady = true;
        }

        if (speechSynthesis && speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = initVoice;
        }

        function speakText(text) {
            stopSpeaking();
            var cleanText = text.replace(/[💪🌟💅✨🤗💕🍎🌈🎯🔥🎉💰❤️]/g, '');
            var voiceSelect = document.getElementById('voiceSelect');
            var selectedVoice = voiceSelect ? voiceSelect.value : 'zh-TW-HsiaoChenNeural';

            if (selectedVoice === 'web-speech' || !useEdgeTTS || !navigator.onLine) {
                speakWithWebSpeech(cleanText);
                return;
            }

            speakWithEdgeTTS(cleanText, selectedVoice).then(function() {
                console.log('TTS 成功');
            }).catch(function(error) {
                console.warn('Edge TTS 失敗，fallback:', error);
                speakWithWebSpeech(cleanText);
            });
        }

        function speakWithEdgeTTS(text, voiceId) {
            return new Promise(function(resolve, reject) {
                var rateInput = document.getElementById('rate');
                var pitchInput = document.getElementById('pitch');
                var rate = rateInput ? rateInput.value : '0.95';
                var pitch = pitchInput ? pitchInput.value : '1.05';

                var ratePercent = Math.round((parseFloat(rate) - 1) * 100);
                var rateStr = ratePercent >= 0 ? '+' + ratePercent + '%' : ratePercent + '%';
                var pitchHz = Math.round((parseFloat(pitch) - 1) * 50);
                var pitchStr = pitchHz >= 0 ? '+' + pitchHz + 'Hz' : pitchHz + 'Hz';

                fetch(TTS_API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        text: text,
                        voice: voiceId,
                        rate: rateStr,
                        pitch: pitchStr,
                        volume: '+0%'
                    })
                }).then(function(response) {
                    if (!response.ok) {
                        return response.json().then(function(data) {
                            throw new Error(data.error || 'HTTP ' + response.status);
                        }).catch(function() {
                            throw new Error('HTTP ' + response.status);
                        });
                    }
                    return response.blob();
                }).then(function(audioBlob) {
                    var audioUrl = URL.createObjectURL(audioBlob);
                    currentAudio = new Audio(audioUrl);

                    isSpeaking = true;
                    var btn = document.getElementById('speakBtn');
                    if (btn) {
                        btn.textContent = '停止';
                        btn.classList.add('speaking');
                    }

                    currentAudio.onended = function() {
                        isSpeaking = false;
                        if (btn) {
                            btn.textContent = '朗讀';
                            btn.classList.remove('speaking');
                        }
                        URL.revokeObjectURL(audioUrl);
                        currentAudio = null;
                        resolve();
                    };

                    currentAudio.onerror = function() {
                        isSpeaking = false;
                        if (btn) {
                            btn.textContent = '朗讀';
                            btn.classList.remove('speaking');
                        }
                        URL.revokeObjectURL(audioUrl);
                        currentAudio = null;
                        reject(new Error('音訊播放失敗'));
                    };

                    currentAudio.play().then(resolve).catch(reject);
                }).catch(reject);
            });
        }

        function speakWithWebSpeech(text) {
            if (!synth || !voiceReady) {
                alert('語音功能不可用，請使用Chrome或Edge瀏覽器！');
                return;
            }
            if (synth.speaking) synth.cancel();

            var u = new SpeechSynthesisUtterance(text);
            u.voice = taiwanVoice;
            u.lang = 'zh-TW';
            u.rate = 0.95;
            u.pitch = 1.05;
            u.volume = 0.9;

            u.onstart = function() {
                isSpeaking = true;
                var btn = document.getElementById('speakBtn');
                if (btn) {
                    btn.textContent = '停止';
                    btn.classList.add('speaking');
                }
            };
            u.onend = function() {
                isSpeaking = false;
                var btn = document.getElementById('speakBtn');
                if (btn) {
                    btn.textContent = '朗讀';
                    btn.classList.remove('speaking');
                }
            };
            synth.speak(u);
        }

        function stopSpeaking() {
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
                currentAudio = null;
            }
            if (synth && synth.speaking) synth.cancel();
            isSpeaking = false;
            var btn = document.getElementById('speakBtn');
            if (btn) {
                btn.textContent = '朗讀';
                btn.classList.remove('speaking');
            }
        }

        function toggleSpeak() {
            if (isSpeaking) stopSpeaking();
            else speakText(fullResponseText);
        }

        function testVoice() {
            var voiceSelect = document.getElementById('voiceSelect');
            var selectedVoice = voiceSelect ? voiceSelect.value : 'zh-TW-HsiaoChenNeural';
            var voiceName = VOICE_MAP[selectedVoice] ? VOICE_MAP[selectedVoice].name : '語音';
            var testText = '我是鶯鶯姊，有我在，免煩惱！這是' + voiceName + '的聲音，你覺得怎麼樣呢？';
            speakText(testText);
        }

        function updateVisitorCount() {
            var countEl = document.getElementById('visitorCount');
            if (countEl) {
                var count = Math.floor(Math.random() * 5000) + 1000;
                countEl.textContent = count.toLocaleString();
            }
        }

        function selectResponse() {
            var select = document.getElementById('problemSelect');
            var customInput = document.getElementById('customProblem');
            if (select && select.value === 'custom') {
                if (customInput) {
                    customInput.style.display = 'block';
                    customInput.focus();
                }
            } else {
                if (customInput) {
                    customInput.style.display = 'none';
                    customInput.value = '';
                }
            }
        }

        function generateResponse() {
            var select = document.getElementById('problemSelect');
            var customInput = document.getElementById('customProblem');
            var responseArea = document.getElementById('responseArea');
            var speakBtn = document.getElementById('speakBtn');

            var problem = select ? select.value : '';
            if (problem === 'custom') {
                problem = customInput ? customInput.value.trim() : '';
                if (!problem) { alert('請輸入您的煩惱內容！'); return; }
            }
            if (!problem) { alert('請選擇或輸入您的煩惱！'); return; }

            var responses = {
                'work': '工作不順心啊？聽我說，職場就像一場馬拉松，不是比誰跑得快，是比誰撐得久！遇到討厭的同事？把他當空氣，專注做好自己的事。主管機車？想想他也有KPI壓力啦。記住，你的價值不是由別人決定的！每天對著鏡子說三次「我很棒」，慢慢就會真的變很棒！加油！',
                'love': '感情問題啊？唉呀，這個我最懂了！失戀就像感冒，會痛會難過，但一定會好的。不要一直看對方的社群媒體，那是自虐行為！把時間花在讓自己變得更好，運動、學習、交朋友，等到你發光發熱的時候，對的人就會被吸引來了。記住，愛自己才是終身浪漫的開始！',
                'money': '錢不夠用啊？這個問題...我也很有同感！但是聽我說，窮只是暫時的，懶才是永久的。先記帳看看錢都花去哪了，砍掉不必要的開支。然後想想怎麼增加收入，斜槓、投資自己、學新技能。記住，投資自己永遠是報酬率最高的！不要灰心，一步步來！',
                'family': '家庭問題啊？這個真的很難解，因為家人是切不斷的緣分。但是記住，你有權利保護自己的情緒空間。如果家人說話讓你難過，可以溫柔但堅定地說「這樣說我會受傷」。不需要為了孝順委屈自己到生病。找個信任的朋友聊聊，或者寫日記宣洩情緒。你值得被好好對待！',
                'health': '身體不舒服啊？這個不能拖！趕快去看醫生，不要上網亂查症狀，會把自己嚇死。身體是革命的本錢，沒有健康什麼都是空。調整作息、多運動、少吃垃圾食物，這些老套但真的有效。記住，照顧好自己不是自私，是必要！早日康復！',
                'friend': '朋友問題啊？長大後就會發現，朋友貴精不貴多。真正的好朋友，是會在你低潮時陪著你的人。如果一段友誼讓你總是感到疲憊，或許該重新評估了。把時間留給那些讓你感到溫暖的人。記住，獨處並不可怕，勉強的社交才可怕！'
            };

            var response = responses[problem] || '「' + problem + '」這個煩惱啊，聽起來真的很讓人心煩。但是你要知道，每個人都有自己的難關，你並不孤單。試著把大問題拆成小步驟，一步一步來。不要對自己太嚴格，你已經很努力了！記住，風雨過後總會有彩虹，這個難關一定會過去的。加油！';

            fullResponseText = response;
            if (responseArea) {
                responseArea.innerHTML = '';
                responseArea.classList.add('show');
            }
            if (speakBtn) speakBtn.style.display = 'inline-block';

            typeWriter(responseArea, response, 50);
        }

        function typeWriter(element, text, speed) {
            if (!element) return;
            var i = 0;
            element.innerHTML = '';
            function type() {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, speed);
                }
            }
            type();
        }
    </script>
</body>
</html>
